name: CI/build and test

on:
  push:
    branches: ["main", "dev"]
    paths: ["**.py", "pyproject.toml"]
  pull_request:
    branches: ["main", "dev"]
    paths: ["**.py", "pyproject.toml"]
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      OS: Linux
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Cache Python packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('pyproject.toml') }}

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Lint with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: "latest"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          VIRTUAL_ENV=$pythonLocation maturin develop --release
          pip install ".[dev]"
          echo "Checking for compiled Rust binary in src/:"
          find src -name "*.so"
          echo "Contents of orthosynassign/lib/:"
          ls -F src/orthosynassign/lib/

      - name: Detect Package Name
        id: detect
        run: |
          echo "PKG_NAME=$(basename $(find src -maxdepth 1 -type d | head -n 2 | tail -n 1))" >> $GITHUB_ENV

      - name: Test with pytest
        run: |
          python -m pytest tests/ -vv \
            --cov=${{ env.PKG_NAME }} \
            --cov-report=xml \
            --cov-config=pyproject.toml

      - name: Upload coverage.xml artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.python }}
          path: coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          flags: ${{ matrix.python }}
          env_vars: OS
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
